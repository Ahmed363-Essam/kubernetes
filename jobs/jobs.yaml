apiVersion: batch/v1
kind: Job
metadata:
  name: data-migration-job
  labels:
    app: data-migration-job
spec:
  template:

    spec:
      containers:
      - name: migration
        image: busybox
        command: ['sh', '-c', "echo  'migration done'"]
      restartPolicy: Never

    
      
       