# https://kubernetes.io/docs/concepts/workloads/controllers/job/
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-db
  namespace: default
  labels:
    app: postgres-db
spec:
  template:
    metadata:
      name: postgres-db
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres-db
        image: postgres:latest


        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: postgress-config-map
              key: POSTGRES_PASSWORD
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: postgress-config-map
              key: POSTGRES_USER
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgress-config-map
              key: POSTGRES_DB
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: postgress-config-map
              key: POSTGRES_PORT

        - name: PGHOST
          value: "db" # This should match the name of the headless service


        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Initializing PostgreSQL database...";
          PGPASSWORD=${POSTGRES_PASSWORD} psql -h ${PGHOST} -U ${POSTGRES_USER} -d ${POSTGRES_DB} <<EOF
          CREATE TABLE IF NOT EXISTS quotes (
              id SERIAL PRIMARY KEY,
              text TEXT,
              author TEXT
          );

          INSERT INTO quotes (text, author) VALUES
          ('من نام عن الصلاة أو نسيها فليصلها إذا ذكرها، لا كفارة لها إلا ذلك', ''),
          ('الإتقان في العمل، فالله سيجازيك على تعبك، ولو بعد حين.', '-'),
          ('لا تتوقف عن الإحسان، فالله سيطوع لك قلب من تحب.', '-'),
          ('الذين آمنوا وتطمئن قلوبهم بذكر الله، اذكر ربك ليسكن قلبك وتتحصن ضد الأفكار السلبية.', ''),
          ('أستغفر الله عدد خلقك ورضى نفسك وزنة عرشك ومداد كلماتك اللهم اغفر للمسلمين جميعا الأحياء منهم والأموات وأدخلهم جناتك، وأعزهم من عذابك.', '-');
          EOF
      restartPolicy: Never
