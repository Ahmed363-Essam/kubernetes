apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-1
  namespace: default
  labels:
    app: nginx-deployment-1
spec:
  selector:
    matchLabels:
      app: nginx-deployment-1
  replicas: 2

  template:
    metadata:
      labels:
        app: nginx-deployment-1
    spec:

      containers:
      - name: nginx-deployment-1
        image: nginx:latest
  
        ports:
        - containerPort: 80

