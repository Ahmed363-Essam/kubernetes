apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment-1
  namespace: default
  labels:
    app: apache-deployment-1
spec:
  selector:
    matchLabels:
      app: apache-deployment-1
  replicas: 2

  template:
    metadata:
      labels:
        app: apache-deployment-1
    spec:

      containers:
      - name: apache-deployment-1
        image: httpd:2.4
  
        ports:
        - containerPort: 80
   
